<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreazyKam</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" type="text/css" href="css/bootstrap-min.css">
    <link rel="stylesheet" type="text/css" href="css/app.css?v=2" />
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #layout {
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .main-row {
            display: flex;
            flex-wrap: nowrap;
            height: 100vh;
            height: 100dvh;
        }

        #sidebar {
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            flex: 1;
            min-width: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .toolbar-container {
            flex-shrink: 0;
            height: 38px;
            overflow: visible;
        }

        .canvas-container {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            width: 100%;
            object-fit: contain;
            display: block;
        }

        #tool-panel {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .status-container {
            flex-shrink: 0;
            height: 40px;
        }

        /* Resize Handle Styles */
        .resize-handle {
            position: relative;
            background-color: #e9ecef;
            z-index: 10;
        }

        .resize-handle-horizontal {
            width: 5px;
            cursor: col-resize;
            flex-shrink: 0;
        }

        .resize-handle-vertical {
            height: 5px;
            cursor: row-resize;
            flex-shrink: 0;
        }

        .resize-handle-bar {
            position: absolute;
            background-color: #6c757d;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .resize-handle-horizontal .resize-handle-bar {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .resize-handle-vertical .resize-handle-bar {
            height: 1px;
            width: 100%;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .resize-handle:hover .resize-handle-bar,
        .resize-handle.dragging .resize-handle-bar {
            opacity: 0.8;
        }

        .resize-handle.dragging {
            background-color: #007bff;
        }
    </style>
</head>

<body>
    <div id="layout">
        <div class="main-row">
            <!-- Full Height Sidebar -->
            <div id="sidebar" class="bg-light border-end" style="width: 260px; flex-shrink: 0;">

            </div>

            <!-- Horizontal Resize Handle -->
            <div class="resize-handle resize-handle-horizontal" id="sidebar-resize">
                <div class="resize-handle-bar"></div>
            </div>

            <!-- Right Panel Stack -->
            <div class="right-panel">
                    <!-- Toolbar -->
                    <div class="toolbar-container">
                        <nav id="toolbar" class="navbar navbar-light bg-light border-bottom p-0 m-0 h-100">
                        </nav>
                    </div>

                    <!-- Canvas Area with Tabs -->
                    <div class="canvas-container border-bottom d-flex flex-column">
                        <!-- Tab Navigation -->
                        <ul class="nav nav-tabs position-relative canvas-tab-header" id="canvasTabs" role="tablist" style="flex-shrink: 0;">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active canvas-view-toggle" id="2d-tab" data-bs-toggle="tab" data-bs-target="#2d-view" type="button" role="tab" aria-controls="2d-view" aria-selected="true">Sketch</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link canvas-view-toggle" id="3d-tab" data-bs-toggle="tab" data-bs-target="#3d-view" type="button" role="tab" aria-controls="3d-view" aria-selected="false">Simulate</button>
                            </li>
                            <li class="nav-item" style="position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;height:100%;pointer-events:none;">
                                <span id="project-name-display" style="font-size:0.875rem;color:#6c757d;font-style:italic;"></span>
                            </li>
                        </ul>

                        <aside id="canvas-object-tree" class="canvas-object-tree" aria-label="Project objects overlay">
                            <div class="canvas-object-tree-panel">
                                <div class="collapse show canvas-object-tree-content" id="svg-paths-section">
                                    <!-- Objects and linked toolpaths will be added dynamically -->
                                </div>
                            </div>
                        </aside>
 
                        <!-- Tab Content -->
                        <div class="tab-content flex-grow-1 canvas-tab-content" id="canvasTabContent" style="min-height: 0;">
<!-- 2D View Tab -->
                            <div class="tab-pane fade show active h-100 position-relative" id="2d-view" role="tabpanel" aria-labelledby="2d-tab">
                                <canvas id="canvas" width="2000" height="2000" style="width: 100%; height: 100%; display: block;"></canvas>
                                <div class="canvas-overlay-controls">
                                    <canvas id="canvas-minimap" width="180" height="120" class="canvas-minimap" aria-label="Canvas minimap"></canvas>
                                </div>
                                <!-- 2D Simulation Controls Overlay -->
                                <div id="simulation-overlay-2d" class="simulation-overlay d-none">
                                    <div id="2d-simulation-controls"></div>
                                </div>
                            </div>
 
                            <!-- 3D View Tab -->
                            <div class="tab-pane fade h-100 position-relative" id="3d-view" role="tabpanel" aria-labelledby="3d-tab">
                                <div id="3d-canvas-container" style="width: 100%; height: 100%;"></div>
                                <div id="3d-loading-overlay" class="three-loading-overlay d-none" aria-live="polite" aria-busy="true">
                                    <div class="three-loading-card">
                                        <div class="three-loading-spinner" aria-hidden="true"></div>
                                        <div id="3d-loading-message" class="three-loading-message">Chargement de la vue 3D...</div>
                                    </div>
                                </div>
                                <!-- 3D Simulation Controls Overlay -->
                                <div id="simulation-overlay-3d" class="simulation-overlay d-none">
                                    <div id="3d-simulation-controls"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <canvas id="paper-canvas" style="display: none;" width="1000" height="1000"></canvas>


    <div id="floating-properties-popup" class="floating-properties-popup" style="display: none;">
        <div id="floating-properties-window" class="floating-properties-window" role="dialog" aria-modal="false" aria-labelledby="floating-properties-popup-title">
            <div id="floating-properties-header" class="floating-properties-header">
                <div class="floating-properties-header-main">
                    <h5 id="floating-properties-popup-title" class="floating-properties-popup-title mb-0">Properties</h5>
                    <small id="floating-properties-popup-subtitle" class="text-muted">Move this window anywhere in the workspace.</small>
                </div>
                <button type="button" class="btn-close" id="floating-properties-close" aria-label="Close"></button>
            </div>
            <div id="floating-properties-body" class="floating-properties-body"></div>
            <div id="floating-properties-footer" class="floating-properties-footer"></div>
        </div>
    </div>
</body>

<script type="text/javascript">
// Register custom inlay icons with Lucide
(function() {
    // Socket: wide short rectangle with a notch cut into the top center
    // x: 1-23 (max width), y: 7-23 (shorter)
    var InlaySocket = [
        ["path", { d: "M3 7h5v4h8V7h5a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z" }]
    ];
    // Plug: wide short rectangle with a tab protruding down from the bottom center
    // x: 1-23 (max width), y: 3-17 (shorter)
    var InlayPlug = [
        ["path", { d: "M3 3h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-5v4H8v-4H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" }]
    ];
    // Inlay: plug (top) above socket (bottom) with 4px gap between
    // Full width x: 1-23, top y: 1-10, gap y: 10-14, bottom y: 14-23
    var Inlay = [
        ["path", { d: "M2 1h20a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-6v2H8V8H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z" }],
        ["path", { d: "M2 14h6v2h8v-2h6a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1z" }]
    ];
    // Build a mutable icons object including custom icons
    var customIcons = Object.assign({}, lucide.icons, {
        InlaySocket: InlaySocket,
        InlayPlug: InlayPlug,
        Inlay: Inlay
    });
    lucide.icons = customIcons;
    // Wrap createIcons so it always uses our extended icons object
    var _origCreateIcons = lucide.createIcons;
    lucide.createIcons = function(opts) {
        opts = opts || {};
        if (!opts.icons) opts.icons = customIcons;
        return _origCreateIcons(opts);
    };
})();
</script>
