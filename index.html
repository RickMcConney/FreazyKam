<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freazy KAM</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" type="text/css" href="css/bootstrap-min.css">
    <link rel="stylesheet" type="text/css" href="css/app.css?v=2" />
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #layout {
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .main-row {
            display: flex;
            flex-wrap: nowrap;
            height: 100vh;
            height: 100dvh;
        }

        #sidebar {
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .right-panel {
            flex: 1;
            min-width: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .toolbar-container {
            flex-shrink: 0;
            height: 38px;
            overflow: visible;
        }

        .canvas-container {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            width: 100%;
            object-fit: contain;
            display: block;
        }

        #tool-panel {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
        }

        .status-container {
            flex-shrink: 0;
            height: 40px;
        }

        /* Resize Handle Styles */
        .resize-handle {
            position: relative;
            background-color: #e9ecef;
            z-index: 10;
        }

        .resize-handle-horizontal {
            width: 5px;
            cursor: col-resize;
            flex-shrink: 0;
        }

        .resize-handle-vertical {
            height: 5px;
            cursor: row-resize;
            flex-shrink: 0;
        }

        .resize-handle-bar {
            position: absolute;
            background-color: #6c757d;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .resize-handle-horizontal .resize-handle-bar {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .resize-handle-vertical .resize-handle-bar {
            height: 1px;
            width: 100%;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .resize-handle:hover .resize-handle-bar,
        .resize-handle.dragging .resize-handle-bar {
            opacity: 0.8;
        }

        .resize-handle.dragging {
            background-color: #007bff;
        }
    </style>
</head>

<body>
    <div id="layout">
        <div class="main-row">
            <!-- Full Height Sidebar -->
            <div id="sidebar" class="bg-light border-end" style="width: 86px; flex-shrink: 0;">

            </div>

            <!-- Right Panel Stack -->
            <div class="right-panel">
                    <!-- Toolbar -->
                    <div class="toolbar-container">
                        <nav id="toolbar" class="navbar navbar-light bg-light border-bottom p-0 m-0 h-100">
                        </nav>
                    </div>

                    <!-- Split 2D / 3D Workspace -->
                    <div class="canvas-container border-bottom d-flex flex-column">
                        <div class="canvas-split-layout flex-grow-1" id="canvasTabContent" style="min-height: 0;">
                            <section class="canvas-pane canvas-pane-2d" id="canvas-pane-2d" aria-label="Sketch 2D">
                                <div class="canvas-pane-body position-relative" id="2d-view">
                                    <canvas id="canvas" width="2000" height="2000" style="width: 100%; height: 100%; display: block;"></canvas>
                                    <div class="canvas-overlay-controls">
                                        <div id="canvas-unit-toggle" class="canvas-unit-toggle" role="group" aria-label="Display units">
                                            <button type="button" class="canvas-unit-toggle-button" data-unit="mm" aria-pressed="true">mm</button>
                                            <button type="button" class="canvas-unit-toggle-button" data-unit="in" aria-pressed="false">inch</button>
                                        </div>
                                    </div>
                                    <div class="canvas-overlay-nav" aria-label="Navigation vue 2D">
                                        <button type="button" id="canvas-zoom-in" class="canvas-nav-button" aria-label="Zoomer">+</button>
                                        <button type="button" id="canvas-zoom-out" class="canvas-nav-button" aria-label="Dezoomer">-</button>
                                        <button type="button" id="canvas-home" class="canvas-nav-button canvas-nav-button-home" aria-label="Revenir a la vue generale">
                                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                                <path d="M4 10.5L12 4l8 6.5"></path>
                                                <path d="M6.5 9.5V20h11V9.5"></path>
                                                <path d="M10 20v-5h4v5"></path>
                                            </svg>
                                        </button>
                                    </div>
                                    <div id="simulation-overlay-2d" class="simulation-overlay d-none">
                                        <div id="2d-simulation-controls"></div>
                                    </div>
                                </div>
                            </section>

                            <div class="canvas-splitter" id="canvas-splitter" role="separator" aria-label="Resize 2D and 3D workspace" aria-orientation="vertical" aria-controls="canvas-pane-2d canvas-pane-3d" aria-valuemin="25" aria-valuemax="75" aria-valuenow="58" tabindex="0"></div>

                             <section class="canvas-pane canvas-pane-3d" id="canvas-pane-3d" aria-label="Result 3D">
                                 <div class="canvas-pane-body position-relative" id="3d-view">
                                     <div class="canvas-overlay-controls canvas-overlay-controls-3d">
                                         <button type="button" class="btn btn-primary btn-sm" id="3d-cut-settings">Change<br />Cut settings</button>
                                     </div>
                                     <div id="3d-canvas-container" style="width: 100%; height: 100%;"></div>
                                     <div id="simulation-overlay-3d" class="simulation-overlay d-none">
                                         <div id="3d-simulation-controls"></div>
                                     </div>
                                 </div>
                            </section>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <div id="3d-loading-overlay" class="three-loading-overlay d-none" aria-live="polite" aria-busy="true">
        <div class="three-loading-card">
            <div class="three-loading-spinner" aria-hidden="true"></div>
            <div id="3d-loading-message" class="three-loading-message">Loading 3D view...</div>
        </div>
    </div>

    <canvas id="paper-canvas" style="display: none;" width="1000" height="1000"></canvas>


    <div id="floating-properties-popup" class="floating-properties-popup" style="display: none;">
        <div id="floating-properties-window" class="floating-properties-window" role="dialog" aria-modal="false" aria-labelledby="floating-properties-popup-title">
            <div id="floating-properties-header" class="floating-properties-header">
                <div class="floating-properties-header-main">
                    <h5 id="floating-properties-popup-title" class="floating-properties-popup-title mb-0">Properties</h5>
                </div>
                <button type="button" class="btn-close" id="floating-properties-close" aria-label="Close"></button>
            </div>
            <div id="floating-properties-body" class="floating-properties-body"></div>
            <div id="floating-properties-footer" class="floating-properties-footer"></div>
        </div>
    </div>
</body>

<script type="text/javascript">
// Register custom inlay icons with Lucide
(function() {
    // Socket: wide short rectangle with a notch cut into the top center
    // x: 1-23 (max width), y: 7-23 (shorter)
    var InlaySocket = [
        ["path", { d: "M3 7h5v4h8V7h5a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z" }]
    ];
    // Plug: wide short rectangle with a tab protruding down from the bottom center
    // x: 1-23 (max width), y: 3-17 (shorter)
    var InlayPlug = [
        ["path", { d: "M3 3h18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-5v4H8v-4H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" }]
    ];
    // Inlay: plug (top) above socket (bottom) with 4px gap between
    // Full width x: 1-23, top y: 1-10, gap y: 10-14, bottom y: 14-23
    var Inlay = [
        ["path", { d: "M2 1h20a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1h-6v2H8V8H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1z" }],
        ["path", { d: "M2 14h6v2h8v-2h6a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1z" }]
    ];
    // Build a mutable icons object including custom icons
    var customIcons = Object.assign({}, lucide.icons, {
        InlaySocket: InlaySocket,
        InlayPlug: InlayPlug,
        Inlay: Inlay
    });
    lucide.icons = customIcons;
    // Wrap createIcons so it always uses our extended icons object
    var _origCreateIcons = lucide.createIcons;
    lucide.createIcons = function(opts) {
        opts = opts || {};
        if (!opts.icons) opts.icons = customIcons;
        return _origCreateIcons(opts);
    };
})();
</script>
